<style>
:root{
  --ink:#0a0a0a;
  --muted:#86868b;
  --paper:#ffffff;
  --sans:-apple-system,"SF Pro Display","SF Pro Text","Inter","Inter var",system-ui,sans-serif;
  --pad:clamp(20px,4vw,64px);
}
*,*::before,*::after{border-radius:0!important;box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html,body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-feature-settings:"ss01","cv11","tnum";line-height:1.45;min-height:100vh}
a{color:inherit;text-decoration:none}
::selection{background:var(--ink);color:var(--paper)}

.success{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:var(--pad);text-align:center;
}
.success .eb{
  font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;
  font-weight:500;margin-bottom:20px;
}
.success h1{
  font-size:clamp(48px,8vw,96px);font-weight:600;letter-spacing:-.03em;line-height:1;
  margin-bottom:16px;
}
.success .sub{
  font-size:clamp(16px,2vw,20px);color:var(--muted);margin-bottom:32px;max-width:36ch;
}
.success .ref{
  font-size:12px;color:var(--muted);letter-spacing:.08em;
  font-family:ui-monospace,"SF Mono",Menlo,monospace;
  margin-bottom:48px;
}
.success .back{
  display:inline-flex;align-items:center;gap:8px;
  font-size:14px;font-weight:500;color:var(--ink);
  padding:14px 28px;border:1px solid var(--ink);
  transition:background .25s ease,color .25s ease;
}
.success .back:hover{background:var(--ink);color:#fff}
.wordmark{
  position:fixed;bottom:-20px;left:50%;transform:translateX(-50%);
  opacity:.04;pointer-events:none;
}
.wordmark img{height:clamp(80px,14vw,160px);width:auto}
</style>
